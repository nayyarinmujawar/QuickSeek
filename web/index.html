<!DOCTYPE html>
<html>
<head>
   <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .hero {
            background-image: url("pic/bg..jpeg"); 
            height: 100vh;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* 👇 Move buttons LOWER */
        .btn-container {
            position: absolute;
            top: 72%;   /* increase = more down */
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .btn {
            padding: 12px 25px;
            margin: 47px;
            border: none;
            background: rgba(101, 67, 33, 0.8); /* brown aesthetic */
            color: white;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(139, 94, 60, 0.9); /* lighter brown */
        }
    </style>
</head>

<body>

    <div class="hero">
        <div class="btn-container">
            <button class="btn" onclick="location.href='login.html'">Login</button>
            <button class="btn" onclick="location.href='register.html'">Register</button>
        </div>
    </div>

</body>
</html>
