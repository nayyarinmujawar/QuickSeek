<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("pic/classroom.jpg");
            background-size: cover;
            background: linear-gradient(135deg,#1a1a1a, #2c2c2c, #3a3a3a);
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* 👇 Glass brown aesthetic box */
        .login-box {
            background: rgba(60, 40, 20, 0.75); /* brown glass */
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            color: #f5e6d3;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .login-box h2 {
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            background: rgba(255,255,255,0.15);
            color: white;
            outline: none;
        }

        .login-box input::placeholder {
            color: #ddd;
        }

        /* 👇 Brown aesthetic button */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: #f4c430;
            color: black;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: rgba(139, 94, 60, 0.95); /* lighter brown */
        }

        .link {
            margin-top: 15px;
            display: block;
            color: #e0c3a3;
            text-decoration: none;
        }

        .link:hover {
            color: white;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Register</h2>

        <form action="RegisterServlet" method="post">
        <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <button type="submit" class="btn">Register</button>
        </form>

        <a href="register.html" class="link"></a>
        <a href="index.html" class="link"> Back to Home</a>
    </div>

</body>
</html>
